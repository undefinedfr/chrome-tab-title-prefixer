<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Tab Title Prefixer — Settings</title>
    <link rel="stylesheet" href="options.css" />
  </head>
  <body>
    <header>
      <h1>Tab Title Prefixer</h1>
      <p>
        Prepends a prefix to the page <code>&lt;title&gt;</code> based on
        hostname rules. A condition applies if the hostname contains
        <em>at least one</em> of its patterns.
      </p>
    </header>

    <main>
      <div class="toolbar">
        <button id="add-condition" type="button">+ Add condition</button>
        <span id="status" class="status" aria-live="polite"></span>
      </div>

      <ul id="conditions" class="conditions"></ul>

      <p id="empty" class="empty" hidden>
        No conditions yet. Click "Add condition" to get started.
      </p>
    </main>

    <template id="condition-template">
      <li class="condition">
        <div class="condition-header">
          <label class="toggle">
            <input type="checkbox" class="condition-enabled" checked />
            <span>Enabled</span>
          </label>
          <button type="button" class="delete-condition" title="Delete condition">
            ✕
          </button>
        </div>
        <div class="field">
          <label>Name</label>
          <input type="text" class="condition-name" placeholder="Local dev" />
        </div>
        <div class="field">
          <label>Prefix</label>
          <input type="text" class="condition-prefix" placeholder="🟢 " />
        </div>
        <div class="field">
          <label>If the hostname contains:</label>
          <ul class="patterns"></ul>
          <button type="button" class="add-pattern">+ Add pattern</button>
        </div>
      </li>
    </template>

    <template id="pattern-template">
      <li class="pattern">
        <input type="text" class="pattern-value" placeholder=".localhost" />
        <button type="button" class="delete-pattern" title="Delete pattern">
          ✕
        </button>
      </li>
    </template>

    <script src="options.js"></script>
  </body>
</html>
